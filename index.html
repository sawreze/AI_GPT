<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4A7DFF">
  <meta name="description" content="AI가 시공 공간 사진을 분석해 어울리는 벽지·필름을 추천하고, 손실률·인건비까지 반영한 정확한 시공 견적을 자동으로 산출하는 스마트 인테리어 앱">
  <title>2026 미래유망 아이디어 챌린지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- React 18 + Babel standalone (CDN, 빌드 과정 없이 브라우저에서 바로 실행) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    :root {
      --ios-bg: #F2F2F7;
      --ios-card: #FFFFFF;
      --ios-dark-text: #1C1C1E;
      --ios-gray-text: #8E8E93;
      --ios-blue: #007AFF;
      --ios-blue2: #4A7DFF;
      --ios-green: #34C759;
      --ios-orange: #FF9500;
      --ios-red: #FF3B30;
      --border-color: rgba(60, 60, 67, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--ios-bg);
      color: var(--ios-dark-text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    .phone-viewport {
      width: 100%;
      max-width: 430px;
      background-color: var(--ios-bg);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ===================== 스와이프 뒤로가기 ===================== */

    .swipe-stage {
      position: relative;
      width: 100%;
    }

    .swipe-layer-current {
      position: relative;
      z-index: 1;
      width: 100%;
      background-color: var(--ios-bg);
    }

    .swipe-stage.active .swipe-layer-current {
      box-shadow: -8px 0 24px rgba(0, 0, 0, 0.12);
      will-change: transform;
    }

    .swipe-layer-prev {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      min-height: 100%;
      background-color: var(--ios-bg);
      z-index: 0;
      will-change: transform;
    }

    .swipe-dim {
      position: absolute;
      inset: 0;
      background: #000;
      pointer-events: none;
      will-change: opacity;
    }

    .app-header {
      padding: 24px 20px 12px 20px;
      position: sticky;
      top: 0;
      background: rgba(242, 242, 247, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 90;
      border-bottom: 1px solid rgba(60, 60, 67, 0.05);
    }

    .app-header h1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .app-header h1 .logo-text {
      color: #4A7DFF;
    }

    .app-header h1 .logo-gear {
      color: #8FB4FA;
      font-size: 26px;
    }

    .app-header h1.logo-clickable {
      cursor: pointer;
      width: fit-content;
      margin: 0 auto;
      transition: opacity 0.15s ease;
    }

    .app-header h1.logo-clickable:active {
      opacity: 0.6;
    }

    .app-header p {
      font-size: 13px;
      color: var(--ios-gray-text);
      margin-top: 4px;
      text-align: center;
    }

    .scroll-content {
      padding: 16px 16px 260px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .ios-group-card {
      background: var(--ios-card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ios-gray-text);
      text-transform: uppercase;
      letter-spacing: -0.2px;
    }

    .target-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: rgba(120, 120, 128, 0.08);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }

    .target-btn {
      background: none;
      border: none;
      padding: 10px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ios-dark-text);
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
    }

    .target-btn.active {
      background: #FFFFFF;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      font-weight: 700;
    }

    .ios-list {
      background: #FFFFFF;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
    }

    .ios-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .ios-row:last-child {
      border-bottom: none;
    }

    .ios-row label {
      font-size: 15px;
      font-weight: 500;
      color: var(--ios-dark-text);
    }

    .ios-input-wrapper {
      display: flex;
      align-items: center;
      background: #F2F2F7;
      border-radius: 8px;
      padding: 8px 12px;
      width: 150px;
    }

    .ios-input-wrapper input {
      border: none;
      background: none;
      width: 100%;
      text-align: right;
      font-size: 15px;
      font-weight: 600;
      color: var(--ios-dark-text);
      outline: none;
    }

    .ios-input-wrapper .unit {
      margin-left: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ios-gray-text);
    }

    .preset-chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .preset-chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      background: #F2F2F7;
      border: none;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ios-dark-text);
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip:active {
      background: rgba(0, 122, 255, 0.1);
      color: var(--ios-blue);
    }

    .chip.favorite-chip {
      background: rgba(0, 122, 255, 0.05);
      border: 1px solid rgba(0, 122, 255, 0.15);
      color: var(--ios-blue);
    }

    .chip.favorite-chip:active {
      background: rgba(0, 122, 255, 0.15);
    }

    .chip .delete-fav-btn {
      background: none;
      border: none;
      color: var(--ios-red);
      font-size: 12px;
      padding-left: 4px;
      cursor: pointer;
    }

    .action-button {
      background: var(--ios-blue);
      color: #FFF;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .action-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .secondary-action-button {
      background: rgba(0, 122, 255, 0.1);
      color: var(--ios-blue);
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease;
    }

    .secondary-action-button:active {
      background: rgba(0, 122, 255, 0.2);
    }

    .action-button:active {
      opacity: 0.8;
    }

    .added-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #F2F2F7;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .item-info .title {
      font-size: 14px;
      font-weight: 600;
    }

    .item-info .spec {
      font-size: 12px;
      color: var(--ios-gray-text);
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--ios-red);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }

    .ios-bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid var(--border-color);
      border-radius: 20px 20px 0 0;
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom)) 20px;
      z-index: 100;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .dashboard-box {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .dashboard-box .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--ios-gray-text);
      text-transform: uppercase;
    }

    .dashboard-box .value {
      font-size: 15px;
      font-weight: 700;
    }

    .dashboard-box .value.danger {
      color: var(--ios-red);
    }

    .dashboard-box .value.prime {
      color: var(--ios-orange);
    }

    .total-divider {
      height: 1px;
      background: var(--border-color);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-row .total-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--ios-dark-text);
    }

    .total-row .total-price {
      font-size: 22px;
      font-weight: 800;
      color: var(--ios-blue);
      letter-spacing: -0.5px;
    }

    /* ===================== AI 추천 플로우 ===================== */

    .ai-hero-card {
      background: linear-gradient(135deg, #4A7DFF 0%, #6FA0FF 100%);
      border-radius: 20px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: #fff;
      box-shadow: 0 10px 24px rgba(74, 125, 255, 0.28);
    }

    .ai-hero-card .ai-hero-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 6px;
    }

    .ai-hero-card h2 {
      font-size: 18px;
      font-weight: 700;
    }

    .ai-hero-card p {
      font-size: 12.5px;
      opacity: 0.92;
      line-height: 1.5;
    }

    .ai-hero-button {
      margin-top: 10px;
      background: #fff;
      color: var(--ios-blue2);
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .step-eyebrow {
      font-size: 12px;
      font-weight: 700;
      color: var(--ios-blue);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .screen-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--ios-dark-text);
      margin-top: 2px;
    }

    .screen-sub {
      font-size: 12.5px;
      color: var(--ios-gray-text);
      line-height: 1.5;
      margin-top: 2px;
    }

    .photo-drop {
      background: var(--ios-card);
      border-radius: 16px;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      border: 1.5px dashed rgba(0,122,255,0.35);
    }

    .photo-drop img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-drop .drop-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(0,122,255,0.08);
      color: var(--ios-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .photo-drop .drop-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ios-blue);
    }

    .photo-drop .drop-hint {
      font-size: 11.5px;
      color: var(--ios-gray-text);
    }

    .photo-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 20px;
    }

    .photo-remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .analyzing-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 70px 20px;
      text-align: center;
    }

    .spinner {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 4px solid rgba(0,122,255,0.15);
      border-top-color: var(--ios-blue);
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .analyzing-title {
      font-size: 16px;
      font-weight: 700;
    }

    .analyzing-sub {
      font-size: 12.5px;
      color: var(--ios-gray-text);
      max-width: 260px;
      line-height: 1.6;
    }

    .analyzing-steps {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 260px;
      text-align: left;
      margin-top: 4px;
    }

    .analyzing-step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--ios-gray-text);
    }

    .analyzing-step.done {
      color: var(--ios-dark-text);
    }

    .analyzing-step i {
      width: 16px;
      color: var(--ios-green);
    }

    .env-photo-strip {
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--ios-card);
      border-radius: 14px;
      padding: 10px;
    }

    .env-photo-strip img {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      object-fit: cover;
    }

    .env-photo-strip .name {
      font-size: 13px;
      font-weight: 600;
    }

    .env-photo-strip .sub {
      font-size: 11.5px;
      color: var(--ios-gray-text);
    }

    .env-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .env-card {
      background: var(--ios-card);
      border-radius: 16px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
    }

    .env-dot-wrap {
      width: 100%;
      height: 26px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .env-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .env-title {
      font-size: 13px;
      font-weight: 700;
    }

    .env-sub {
      font-size: 11.5px;
      color: var(--ios-gray-text);
      line-height: 1.4;
    }

    .rec-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .rec-card {
      background: var(--ios-card);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }

    .rec-swatch {
      width: 100%;
      height: 64px;
      border-radius: 12px;
      position: relative;
    }

    .rec-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--ios-blue);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 20px;
    }

    .rec-brand {
      font-size: 11px;
      font-weight: 700;
      color: var(--ios-blue);
      text-transform: uppercase;
    }

    .rec-name {
      font-size: 15px;
      font-weight: 700;
      margin-top: 1px;
    }

    .rec-reason {
      font-size: 12px;
      color: var(--ios-gray-text);
      line-height: 1.45;
    }

    .rec-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--ios-gray-text);
    }

    .rec-select-btn {
      background: rgba(0,122,255,0.1);
      color: var(--ios-blue);
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .rec-select-btn.chosen {
      background: var(--ios-blue);
      color: #fff;
    }

    .ai-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(52, 199, 89, 0.1);
      border: 1px solid rgba(52, 199, 89, 0.25);
      color: #1c7a37;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12.5px;
      font-weight: 600;
      line-height: 1.4;
    }

    .ai-banner i {
      color: var(--ios-green);
      font-size: 16px;
    }

    .field-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-row label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ios-gray-text);
    }

    .field-row input[type="text"] {
      border: none;
      background: #F2F2F7;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ios-dark-text);
      outline: none;
    }

    .error-text {
      font-size: 12px;
      color: var(--ios-red);
      font-weight: 600;
    }

    .sensor-icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      padding: 28px 20px;
    }

    .sensor-icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: rgba(0,122,255,0.08);
      color: var(--ios-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .sensor-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ios-gray-text);
    }

    .sensor-status-row.connected {
      color: #1c7a37;
    }

    .sensor-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ios-gray-text);
    }

    .sensor-status-row.connected .sensor-status-dot {
      background: var(--ios-green);
    }

    .sensor-live-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 20px;
    }

    .sensor-live-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0,122,255,0.08);
      color: var(--ios-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .sensor-big-value {
      display: flex;
      align-items: baseline;
      gap: 3px;
    }

    .sensor-big-value .num {
      font-size: 34px;
      font-weight: 800;
      color: var(--ios-blue);
      letter-spacing: -0.5px;
    }

    .sensor-big-value .unit {
      font-size: 16px;
      font-weight: 700;
      color: var(--ios-blue);
    }

    .sensor-live-sub {
      font-size: 12.5px;
      color: var(--ios-gray-text);
      margin-top: 2px;
    }

    .link-button {
      background: none;
      border: none;

    function calcTotals(items, film) {
      const filmWidthCm = parseFloat(film.width);
      const rollPrice = parseFloat(film.price);
      const cutMarginCm = parseFloat(film.cutMargin) || 0;

      const empty = { netArea: 0, neededLength: 0, lossRate: 0, lossCost: 0, manpower: 0, laborCost: 0, totalPrice: 0 };

      if (isNaN(filmWidthCm) || filmWidthCm <= 0 || isNaN(rollPrice) || rollPrice < 0) {
        return empty;
      }

      let totalNetArea = 0;
      let totalNeededLengthM = 0;
      let totalManpower = 0;
      let totalLaborCost = 0;

      items.forEach(item => {
        const singleArea = (item.width / 100) * (item.height / 100);
        totalNetArea += singleArea * item.qty;

        const strips = Math.ceil(item.width / filmWidthCm);
        const cutLengthM = (item.height + cutMarginCm) / 100;
        totalNeededLengthM += strips * cutLengthM * item.qty;

        const dbConfig = processDB[item.targetKey];
        if (dbConfig) {
          let itemManpower;
          if (dbConfig.laborRatePerArea) {
            itemManpower = (singleArea * item.qty) * dbConfig.laborRatePerArea;
          } else {
            itemManpower = item.qty * dbConfig.laborRatePerQty;
          }
          totalManpower += itemManpower;
          totalLaborCost += itemManpower * dbConfig.dayRate;
        }
      });

      if (totalNetArea === 0) {
        return empty;
      }

      const pricePerMeter = rollPrice / 50;
      const totalMaterialPrice = Math.round(totalNeededLengthM * pricePerMeter);

      const purchasedArea = totalNeededLengthM * (filmWidthCm / 100);
      const wasteArea = Math.max(0, purchasedArea - totalNetArea);
      const lossPercentage = purchasedArea > 0 ? (wasteArea / purchasedArea) * 100 : 0;
      const lossCost = Math.round(totalMaterialPrice * (lossPercentage / 100));

      const finalTotalPrice = totalMaterialPrice + totalLaborCost;

      return {
        netArea: totalNetArea,
        neededLength: totalNeededLengthM,
        lossRate: lossPercentage,
        lossCost,
        manpower: totalManpower,
        laborCost: totalLaborCost,
        totalPrice: finalTotalPrice
      };
    }

    /* ===================== AI 환경 분석 엔진 =====================
       실제 업로드된 사진의 픽셀 데이터를 canvas로 직접 읽어
       평균 밝기 / 색 온도(RGB 비율) / 인접 픽셀 대비(엣지량) / 채도를
       계산하는 클라이언트 사이드 이미지 분석 로직입니다.
       (별도의 서버·유료 AI API 없이 브라우저에서 즉시 동작합니다.)
       습도처럼 사진만으로 100% 확정할 수 없는 값은 "추정치"로 표기하며,
       색상·채도 데이터를 기반으로 한 근사 모델입니다.
    ================================================================ */

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('파일을 읽지 못했습니다.'));
        reader.readAsDataURL(file);
      });
    }

    function analyzeImageDataUrl(dataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          try {
            const maxDim = 160;
            const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
            const w = Math.max(1, Math.round(img.width * scale));
            const h = Math.max(1, Math.round(img.height * scale));
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const data = ctx.getImageData(0, 0, w, h).data;

            let sumR = 0, sumG = 0, sumB = 0, sumLum = 0, sumSat = 0, count = 0;
            for (let i = 0; i < data.length; i += 4) {
              const r = data[i], g = data[i + 1], b = data[i + 2];
              sumR += r; sumG += g; sumB += b;
              sumLum += 0.299 * r + 0.587 * g + 0.114 * b;
              const rn = r / 255, gn = g / 255, bn = b / 255;
              const mx = Math.max(rn, gn, bn), mn = Math.min(rn, gn, bn);
              sumSat += mx === 0 ? 0 : (mx - mn) / mx;
              count++;
            }

            let edgeSum = 0, edgeCount = 0;
            for (let y = 1; y < h; y++) {
              for (let x = 1; x < w; x++) {
                const idx = (y * w + x) * 4;
                const idxL = (y * w + x - 1) * 4;
                const idxU = ((y - 1) * w + x) * 4;
                const lum = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
                const lumL = 0.299 * data[idxL] + 0.587 * data[idxL + 1] + 0.114 * data[idxL + 2];
                const lumU = 0.299 * data[idxU] + 0.587 * data[idxU + 1] + 0.114 * data[idxU + 2];
                edgeSum += Math.abs(lum - lumL) + Math.abs(lum - lumU);
                edgeCount++;
              }
            }

            resolve({
              avgLum: sumLum / count,
              avgR: sumR / count,
              avgG: sumG / count,
              avgB: sumB / count,
              avgSat: sumSat / count,
              avgEdge: edgeCount ? edgeSum / edgeCount : 0,
              width: img.width,
              height: img.height
            });
          } catch (e) {
            reject(e);
          }
        };
        img.onerror = () => reject(new Error('이미지를 불러오지 못했습니다.'));
        img.src = dataUrl;
      });
    }

    function deriveEnvironmentTags(m) {
      // 습도는 더 이상 사진으로 추정하지 않습니다 (실제 습도 센서 값을 사용).
      // 여기서는 사진으로 실제 확인 가능한 채광 · 벽면 상태 · 톤만 분석합니다.
      let light;
      if (m.avgLum >= 165) light = { label: "강한 직사광", level: "high", color: "orange" };
      else if (m.avgLum >= 100) light = { label: "보통 채광", level: "mid", color: "blue" };
      else light = { label: "약한 · 간접광", level: "low", color: "gray" };

      const warmth = m.avgR - m.avgB;
      let tone;
      if (warmth > 10) tone = { label: "따뜻한 웜톤", level: "warm", color: "orange" };
      else if (warmth < -10) tone = { label: "차가운 쿨톤", level: "cool", color: "blue" };
      else tone = { label: "중립 뉴트럴톤", level: "neutral", color: "green" };

      let wall;
      if (m.avgEdge >= 16) wall = { label: "요철 · 얼룩 감지", level: "rough", color: "red" };
      else if (m.avgEdge >= 8) wall = { label: "약간의 요철", level: "mid", color: "orange" };
      else wall = { label: "평탄한 벽면", level: "smooth", color: "green" };

      return { light, tone, wall };
    }

    /* ===================== 습도 센서 연동 (Web Bluetooth) =====================
       스마트폰 자체에는 습도 센서가 없기 때문에, 표준 BLE GATT 규격인
       Environmental Sensing Service(0x181A)의 Humidity(0x2A6F) /
       Temperature(0x2A6E) characteristic을 그대로 사용합니다.
       이 규격을 지원하는 실제 블루투스 습도계라면 기종에 관계없이 연결됩니다.
       (Web Bluetooth는 Chrome/Edge 등 일부 브라우저 + HTTPS 환경에서만 동작하며,
        지원하지 않는 환경이나 주변에 센서가 없을 때를 대비해 수동 입력을 제공합니다.)
    ============================================================================ */

    const ESS_SERVICE_UUID = 0x181A;
    const HUMIDITY_CHAR_UUID = 0x2A6F;
    const TEMPERATURE_CHAR_UUID = 0x2A6E;

    async function connectHumiditySensor() {
      if (!navigator.bluetooth) {
        const err = new Error('이 브라우저는 Web Bluetooth를 지원하지 않습니다.');
        err.code = 'UNSUPPORTED';
        throw err;
      }
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [ESS_SERVICE_UUID] }],
        optionalServices: [ESS_SERVICE_UUID]
      });
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(ESS_SERVICE_UUID);

      const humidityChar = await service.getCharacteristic(HUMIDITY_CHAR_UUID);
      const humidityValue = await humidityChar.readValue();
      const humidity = humidityValue.getUint16(0, true) / 100; // 0.01% 단위

      let temperature = null;
      try {
        const tempChar = await service.getCharacteristic(TEMPERATURE_CHAR_UUID);
        const tempValue = await tempChar.readValue();
        temperature = tempValue.getInt16(0, true) / 100; // 0.01°C 단위
      } catch (e) {
        // 온도 characteristic이 없는 기기도 있으므로 무시하고 진행합니다.
      }

      return { deviceName: device.name || '습도 센서', humidity, temperature };
    }

    function humidityTagFromValue(pct) {
      let level, color;
      if (pct >= 60) { level = 'high'; color = 'blue'; }
      else if (pct >= 40) { level = 'mid'; color = 'green'; }
      else { level = 'low'; color = 'gray'; }
      return { label: `${pct.toFixed(1)}%`, level, color, value: pct };
    }

    // 조건별 소재 선호 가중치 (양수: 추천, 음수: 비추천)
    const typePreferences = {

    };

    function scoreMaterial(material, tags) {
      let score = 0;
      const collected = [];
      [["light", tags.light.level], ["humidity", tags.humidity.level], ["wall", tags.wall.level], ["tone", tags.tone.level]]
        .forEach(([dim, level]) => {
          const key = `${dim}_${level}`;
          const pref = typePreferences[key];
          const w = pref ? (pref[material.type] || 0) : 0;
          score += w;
          if (w > 0) {
            const phrase = (reasonPhrases[key] || {})[material.type];
            if (phrase) collected.push({ w, text: phrase });
          }
        });
      collected.sort((a, b) => b.w - a.w);
      return { score, reasons: collected.map(c => c.text) };
    }

    function getRecommendations(tags, count = 3) {
      const scored = materialDB.map(m => {
        const { score, reasons } = scoreMaterial(m, tags);
        return { ...m, score, reasons };
      });
      scored.sort((a, b) => b.score - a.score || a.price - b.price);

      const picked = [];
      const usedBrands = new Set();
      scored.forEach(m => {
        if (picked.length >= count) return;
        if (usedBrands.has(m.brand)) return;
        usedBrands.add(m.brand);
        picked.push(m);
      });
      scored.forEach(m => {
        if (picked.length >= count) return;
        if (!picked.find(p => p.id === m.id)) picked.push(m);
      });

      return picked.map(m => ({
        ...m,
        matchPct: Math.max(60, Math.min(98, Math.round(62 + m.score * 4))),
        reasonText: m.reasons[0] || "공간 조건에 무난하게 어울리는 마감재"
      }));
    }

    /* ===================== 엣지 스와이프 뒤로가기 =====================
       화면 맨 왼쪽 가장자리(~24px)에서 오른쪽으로 드래그하면
       아이폰 네이티브 백 제스처처럼 현재 화면이 오른쪽으로 밀려나면서
       이전 화면이 뒤에서 따라 나오고, 일정 거리 이상 놓으면 이전 화면으로
       전환됩니다. (홈 화면에는 이전 화면이 없으므로 동작하지 않습니다.)
    ==================================================================== */

    const EDGE_ZONE_PX = 24;
    const COMMIT_THRESHOLD = 0.3;
    const SETTLE_MS = 300;
    const SWIPE_EASE = 'cubic-bezier(0.22, 1, 0.36, 1)';
    const PREV_SHIFT = 28; // 이전 화면 패럴랙스 이동량(%)

    function SwipeBackStage({ screen, backTarget, onCommitBack, renderScreen }) {
      const stageRef = useRef(null);
      const currentLayerRef = useRef(null);
      const prevLayerRef = useRef(null);
      const dimRef = useRef(null);
      const rafRef = useRef(0);
      const gestureRef = useRef({ tracking: false, decided: false, horizontal: false, activated: false, startX: 0, startY: 0, width: 0, currentX: 0 });
      // 제스처 진행 중에만 이전 화면을 마운트하기 위한 상태 (드래그 프레임마다는 절대 setState 하지 않음)
      const [active, setActive] = useState(false);

      // 드래그 프레임: React를 거치지 않고 DOM 스타일을 직접 갱신해 부드럽게 움직입니다.
      const applyDragFrame = () => {
        rafRef.current = 0;
        const g = gestureRef.current;
        const width = g.width || 1;
        const x = g.currentX;
        const progress = Math.min(1, Math.max(0, x / width));
        const cur = currentLayerRef.current;
        const prev = prevLayerRef.current;
        const dim = dimRef.current;
        if (cur) {
          cur.style.transition = 'none';
          cur.style.transform = `translate3d(${x}px, 0, 0)`;
        }
        if (prev) {
          prev.style.transition = 'none';
          prev.style.transform = `translate3d(${(progress - 1) * PREV_SHIFT}%, 0, 0)`;
        }
        if (dim) {
          dim.style.transition = 'none';
          dim.style.opacity = (1 - progress) * 0.18;
        }
      };

      const scheduleFrame = () => {
        if (!rafRef.current) rafRef.current = window.requestAnimationFrame(applyDragFrame);
      };

      const settle = (toCommit) => {
        const g = gestureRef.current;
        const width = g.width || 1;
        const cur = currentLayerRef.current;
        const prev = prevLayerRef.current;
        const dim = dimRef.current;
        if (cur) {
          cur.style.transition = `transform ${SETTLE_MS}ms ${SWIPE_EASE}`;
          cur.style.transform = `translate3d(${toCommit ? width : 0}px, 0, 0)`;
        }
        if (prev) {
          prev.style.transition = `transform ${SETTLE_MS}ms ${SWIPE_EASE}`;
          prev.style.transform = `translate3d(${toCommit ? 0 : -PREV_SHIFT}%, 0, 0)`;
        }
        if (dim) {
          dim.style.transition = `opacity ${SETTLE_MS}ms ${SWIPE_EASE}`;
          dim.style.opacity = toCommit ? 0 : 0.18;
        }
        window.setTimeout(() => {
          // 애니메이션이 끝나면 현재 레이어에 남은 인라인 transform 을 반드시 초기화한다.
          // (초기화하지 않으면 화면 전체가 오른쪽으로 밀린 채로 굳어버림)
          const curEl = currentLayerRef.current;
          if (curEl) {
            curEl.style.transition = 'none';
            curEl.style.transform = '';
          }
          if (toCommit) onCommitBack();
          setActive(false);
        }, SETTLE_MS);
      };

      const handleTouchStart = (e) => {
        if (!backTarget || active) return;
        const t = e.touches[0];
        if (t.clientX > EDGE_ZONE_PX) return;
        const width = stageRef.current ? stageRef.current.clientWidth : window.innerWidth;
        gestureRef.current = { tracking: true, decided: false, horizontal: false, activated: false, startX: t.clientX, startY: t.clientY, width, currentX: 0 };
      };

      const handleTouchMove = (e) => {
        const g = gestureRef.current;
        if (!g.tracking) return;
        const t = e.touches[0];
        const dx = t.clientX - g.startX;
        const dy = t.clientY - g.startY;
        if (!g.decided) {
          if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
          g.decided = true;
          g.horizontal = dx > 0 && Math.abs(dx) > Math.abs(dy);
          if (!g.horizontal) { g.tracking = false; return; }
        }
        if (!g.horizontal) return;
        e.preventDefault();
        g.currentX = Math.max(0, Math.min(dx, g.width));
        if (!g.activated) {
          g.activated = true;
          setActive(true); // 이전 화면을 한 번만 마운트 (이후 프레임은 ref 직접 조작)
        }
        scheduleFrame();
      };

      const finishGesture = () => {
        if (rafRef.current) { window.cancelAnimationFrame(rafRef.current); rafRef.current = 0; }
        const g = gestureRef.current;
        if (!g.tracking || !g.horizontal) {
          g.tracking = false;
          if (g.activated) { g.activated = false; setActive(false); }
          return;
        }
        g.tracking = false;
        g.activated = false;
        const width = g.width || 1;
        const progress = g.currentX / width;
        settle(progress > COMMIT_THRESHOLD);
      };

      return (
        <div
          className={`swipe-stage${active ? ' active' : ''}`}
          ref={stageRef}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={finishGesture}
          onTouchCancel={finishGesture}
        >
          {active && (
            <div className="swipe-layer-prev" ref={prevLayerRef} style={{ transform: `translate3d(${-PREV_SHIFT}%, 0, 0)` }}>
              {renderScreen(backTarget)}
              <div className="swipe-dim" ref={dimRef} style={{ opacity: 0.18 }}></div>
            </div>
          )}
          <div className="swipe-layer-current" ref={currentLayerRef}>
            {renderScreen(screen)}
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState('home');
      const [sensorData, setSensorData] = useState(null);
      const [photo, setPhoto] = useState(null);
      const [analysis, setAnalysis] = useState(null);
      const [chosenMaterial, setChosenMaterial] = useState(null);
      const [analyzeError, setAnalyzeError] = useState("");

      const goHome = () => {
        setScreen('home');
        setSensorData(null);
        setPhoto(null);
        setAnalysis(null);
        setAnalyzeError("");
      };

      const handleSensorConnected = (data) => {
        setSensorData(data);
        setScreen('aiUpload');
      };

      const handleAnalyze = (photoInfo) => {
        setPhoto(photoInfo);
        setAnalyzeError("");
        setScreen('aiAnalyzing');
      };

      const handleAnalyzeDone = ({ metrics, tags }) => {
        const humidityTag = humidityTagFromValue(sensorData ? sensorData.humidity : 50);
        setAnalysis({ metrics, tags: { ...tags, humidity: humidityTag } });
        setScreen('aiResult');
      };

      const handleAnalyzeError = () => {
        setAnalyzeError("사진을 분석하지 못했어요. 다른 사진으로 다시 시도해 주세요.");
        setScreen('aiUpload');
      };

      const handleChooseMaterial = (item) => {
        setChosenMaterial({ name: `${item.brand} ${item.name}`, width: String(item.width), price: String(item.price), cutMargin: '10' });
      };

      const goToCalculatorWithChoice = () => {
        setScreen('calculator');
      };

      // 각 화면의 "뒤로가기" 대상 화면. 홈 화면과 분석 중 화면은 대상이 없어
      // 뒤로가기 버튼도, 엣지 스와이프도 동작하지 않습니다.
      const getBackTarget = (s) => {
        switch (s) {
          case 'sensorConnect': return 'home';
          case 'aiUpload': return 'sensorConnect';
          case 'aiResult': return 'aiUpload';
          case 'aiRecommend': return 'aiResult';
          case 'calculator': return 'home';
          default: return null;
        }
      };

      const goToScreen = (target) => {
        if (target === 'home') {
          goHome();
        } else {
          setScreen(target);
        }
      };

      const handleBack = () => {
        const target = getBackTarget(screen);
        if (target) goToScreen(target);
      };

      // 스와이프 중에는 현재 화면과 "뒤로가기 대상" 화면을 동시에 렌더링해야 하므로
      // 화면 이름을 받아 해당 화면 JSX를 반환하는 함수로 분리합니다.
      const renderScreenContent = (name) => {
        switch (name) {
          case 'home':
            return (
              <HomeScreen
                onStartAI={() => setScreen('sensorConnect')}
                onStart={() => { setChosenMaterial(null); setScreen('calculator'); }}
              />
            );
          case 'sensorConnect':
            return <SensorConnectScreen onBack={handleBack} onConnected={handleSensorConnected} />;
          case 'aiUpload':
            return (
              <React.Fragment>
                {analyzeError && (
                  <div className="scroll-content" style={{ paddingBottom: 0 }}>
                    <div className="error-text">{analyzeError}</div>
                  </div>
                )}
                <AIUploadScreen onBack={handleBack} onAnalyze={handleAnalyze} />
              </React.Fragment>
            );
          case 'aiAnalyzing':
            return photo ? (
              <AIAnalyzingScreen photo={photo} onDone={handleAnalyzeDone} onError={handleAnalyzeError} />
            ) : null;
          case 'aiResult':
            return (photo && analysis) ? (
              <AIResultScreen
                photo={photo}
                tags={analysis.tags}
                onBack={handleBack}
                onNext={() => setScreen('aiRecommend')}
              />
            ) : null;
          case 'aiRecommend':
            return analysis ? (
              <React.Fragment>
                <AIRecommendScreen
                  tags={analysis.tags}
                  onBack={handleBack}
                  onChoose={handleChooseMaterial}
                />
                {chosenMaterial && (
                  <div style={{ position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)', width: '100%', maxWidth: 430, padding: '14px 16px calc(14px + env(safe-area-inset-bottom)) 16px', background: 'rgba(255,255,255,0.9)', backdropFilter: 'blur(20px)', borderTop: '1px solid var(--border-color)' }}>
                    <button className="action-button" onClick={goToCalculatorWithChoice}>
                      <i className="fa-solid fa-calculator"></i> 선택한 자재로 견적 계산하기
                    </button>
                  </div>
                )}
              </React.Fragment>
            ) : null;
          case 'calculator':
            return <CalculatorScreen onBack={handleBack} initialFilm={chosenMaterial} aiApplied={!!chosenMaterial} />;
          default:
            return null;
        }
      };

      return (
        <div className="phone-viewport">
          <Header isHome={screen === 'home'} onLogoClick={goHome} />
          <SwipeBackStage
            screen={screen}
            backTarget={getBackTarget(screen)}
            onCommitBack={handleBack}
            renderScreen={renderScreenContent}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
